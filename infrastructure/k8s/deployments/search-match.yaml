apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-gateway
  namespace: storedge
  labels:
    app: iot-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-gateway
  template:
    metadata:
      labels:
        app: iot-gateway
    spec:
      containers:
        - name: iot-gateway
          image: ghcr.io/storedge/iot-gateway:latest
          ports:
            - containerPort: 8083
              name: http
            - containerPort: 1883
              name: mqtt
          envFrom:
            - configMapRef:
                name: storedge-common
            - secretRef:
                name: storedge-secrets
          env:
            - name: PORT
              value: "8083"
            - name: MQTT_PORT
              value: "1883"
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
