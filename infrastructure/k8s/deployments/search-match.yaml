apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-portal
  namespace: storedge
  labels:
    app: web-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-portal
  template:
    metadata:
      labels:
        app: web-portal
    spec:
      containers:
        - name: web-portal
          image: ghcr.io/storedge/web-portal:latest
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
