apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-match
  namespace: storedge
  labels:
    app: search-match
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-match
  template:
    metadata:
      labels:
        app: search-match
    spec:
      containers:
        - name: search-match
          image: ghcr.io/storedge/search-match:latest
          ports:
            - containerPort: 8080
              name: rest
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: storedge-common
            - secretRef:
                name: storedge-secrets
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "50051"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-wms
  namespace: storedge
  labels:
    app: inventory-wms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-wms
  template:
    metadata:
      labels:
        app: inventory-wms
    spec:
      containers:
        - name: inventory-wms
          image: ghcr.io/storedge/inventory-wms:latest
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: storedge-common
            - secretRef:
                name: storedge-secrets
          env:
            - name: SERVER_PORT
              value: "8081"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
